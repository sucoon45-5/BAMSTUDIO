<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard — BAM Studio</title>
    <link rel="stylesheet" href="/src/style.css">
    <script type="module" src="/src/main.js" defer></script>
    <script type="module" src="/src/dashboard.js" defer></script>
</head>

<body>
    <div id="nav-placeholder"></div>

    <section class="pt-32 pb-16 px-6">
        <div class="max-w-5xl mx-auto">
            <div class="flex items-center justify-between mb-8 flex-wrap gap-4">
                <div>
                    <h1 class="text-3xl font-bold">My <span class="neon-text">Dashboard</span></h1>
                    <p class="text-slate-400 mt-1">Manage your studio bookings and sessions</p>
                </div>
                <a href="/booking.html" class="btn-primary">+ New Booking</a>
            </div>

            <!-- Guest warning -->
            <div id="guestWarning" class="card p-8 text-center mb-6 hidden" style="border-color:rgba(239,68,68,.3)">
                <div class="text-4xl mb-3">🔒</div>
                <h3 class="text-xl font-bold mb-2">Login Required</h3>
                <p class="text-slate-400 mb-4">Please login to view your bookings.</p>
                <a href="/login.html" class="btn-primary">Login Now</a>
            </div>

            <!-- Dashboard content -->
            <div id="dashboardContent">
                <!-- Stats -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="userStats">
                    <div class="card p-5 text-center">
                        <div class="stat-number neon-text" id="statTotal">—</div>
                        <div class="text-slate-500 text-sm">Total Bookings</div>
                    </div>
                    <div class="card p-5 text-center">
                        <div class="stat-number" style="color:#22c55e;font-size:2.5rem;font-weight:900"
                            id="statConfirmed">—</div>
                        <div class="text-slate-500 text-sm">Confirmed</div>
                    </div>
                    <div class="card p-5 text-center">
                        <div class="stat-number" style="color:#f59e0b;font-size:2.5rem;font-weight:900"
                            id="statPending">—</div>
                        <div class="text-slate-500 text-sm">Pending</div>
                    </div>
                    <div class="card p-5 text-center">
                        <div class="stat-number neon-text" id="statSpent">—</div>
                        <div class="text-slate-500 text-sm">Total Spent</div>
                    </div>
                </div>

                <!-- Bookings List -->
                <div class="card overflow-hidden">
                    <div class="p-6 border-b flex items-center justify-between" style="border-color:var(--dark-border)">
                        <h3 class="font-bold">Your Bookings</h3>
                        <div class="flex gap-2">
                            <button class="tab-btn active" data-filter="all">All</button>
                            <button class="tab-btn" data-filter="pending">Pending</button>
                            <button class="tab-btn" data-filter="approved">Confirmed</button>
                            <button class="tab-btn" data-filter="cancelled">Cancelled</button>
                        </div>
                    </div>
                    <div id="bookingsList" class="p-6">
                        <div class="text-center py-12">
                            <div class="spinner mx-auto mb-4"></div>
                            <p class="text-slate-400">Loading bookings...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Reschedule Modal -->
    <div id="rescheduleModal" class="fixed inset-0 z-50 hidden flex items-center justify-center px-4"
        style="background:rgba(0,0,0,.7);backdrop-filter:blur(8px)">
        <div class="card p-8 w-full max-w-md">
            <h3 class="text-xl font-bold mb-5">Reschedule Session</h3>
            <div class="space-y-4">
                <div class="form-group">
                    <label class="form-label" for="rescheduleDate">New Date</label>
                    <input type="date" id="rescheduleDate" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label" for="rescheduleTime">New Time</label>
                    <select id="rescheduleTime" class="form-input">
                        <option value="08:00">8:00 AM</option>
                        <option value="10:00">10:00 AM</option>
                        <option value="12:00">12:00 PM</option>
                        <option value="14:00">2:00 PM</option>
                        <option value="16:00">4:00 PM</option>
                        <option value="18:00">6:00 PM</option>
                        <option value="20:00">8:00 PM</option>
                    </select>
                </div>
                <input type="hidden" id="rescheduleId">
            </div>
            <div class="flex gap-3 mt-6">
                <button id="cancelReschedule" class="btn-outline flex-1">Cancel</button>
                <button id="confirmReschedule" class="btn-primary flex-1">Confirm</button>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <div class="toast" id="toast"></div>
</body>

</html>
